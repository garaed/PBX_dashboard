; ═══════════════════════════════════════════════════════════════════════════════
; RANDCOOL v2 — групповые пулы extension с ротацией по порогу звонков
;
; Инициализация пулов: python3 pool_setup.py
; Статус пулов:        python3 pool_setup.py --status
; Принудительная ротация: python3 pool_setup.py --rotate [--group 2033]
; ═══════════════════════════════════════════════════════════════════════════════

[randcool]
exten => _X.,1,NoOp(RANDCOOL-V2 group=${CALLERID(num)} dst=${EXTEN})
 ; ── Параметры из AstDB ───────────────────────────────────────────────────────
 same => n,Set(GRP=${CALLERID(num)})
 same => n,Set(NUMBER=${EXTEN})
 same => n,Set(THRESHOLD=${DB(cool/threshold)})
 same => n,Set(THRESHOLD=${IF($["${THRESHOLD}"=""]?100:${THRESHOLD})})
 same => n,Set(COOLDOWN=${DB(cool/cooldown)})
 same => n,Set(COOLDOWN=${IF($["${COOLDOWN}"=""]?30:${COOLDOWN})})
 ; ── Пул группы ───────────────────────────────────────────────────────────────
 same => n,Set(TRUNKLIST=${DB(glist/${GRP})})
 same => n,GotoIf($["${TRUNKLIST}"!=""]?go)
 same => n,NoOp(Нет пула для группы ${GRP} — используем global)
 same => n,Set(TRUNKLIST=${DB(cool/global)})
 same => n(go),GotoIf($["${TRUNKLIST}"!=""]?start)
 same => n,Goto(allbusy)
 ; ── Инициализация цикла ──────────────────────────────────────────────────────
 same => n(start),Set(TLEN=${FIELDQTY(TRUNKLIST,&)})
 same => n,Set(TRY=1)
 same => n,Set(STARTIDX=${RAND(1,${TLEN})})
 ; ── Выбор extension ──────────────────────────────────────────────────────────
 same => n(choose),GotoIf($[${TRY} > ${TLEN}]?allbusy)
 same => n,Set(IDX=$[((${STARTIDX}+${TRY}-2)%${TLEN})+1])
 same => n,Set(TR=${CUT(TRUNKLIST,&,${IDX})})
 ; 1. Сгоревший?
 same => n,GotoIf($["${DB(gstatus/${TR})}"="burned"]?skip)
 ; 2. Превышен порог?
 same => n,Set(CNT=${DB(gcount/${TR})})
 same => n,Set(CNT=${IF($["${CNT}"=""]?0:${CNT})})
 same => n,GotoIf($[${CNT} >= ${THRESHOLD}]?burn)
 ; 3. IN_CALL или кулдаун?
 same => n,Set(NOW=${EPOCH})
 same => n,Set(STATE=${DB(cool/${TR})})
 same => n,GotoIf($["${STATE}"=""]?useit)
 same => n,GotoIf($["${STATE}"="IN_CALL"]?skip)
 same => n,GotoIf($[${NOW} < ${STATE}]?skip)
 ; ── Используем extension ─────────────────────────────────────────────────────
 same => n(useit),NoOp(Using ${TR} | calls=${CNT}/${THRESHOLD} | group=${GRP})
 same => n,Set(DB(cool/${TR})=IN_CALL)
 same => n,Set(__RANDCOOL_TRUNK=${TR})
 same => n,Set(CHANNEL(hangup_handler_push)=randcool-hangup,s,1)
 same => n,Gosub(sub-record-check,s,1(out,${NUMBER},force))
 same => n,Dial(PJSIP/${NUMBER}@${TR},60,g)
 ; После звонка
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n,NoOp(Failed: ${DIALSTATUS} trunk=${TR})
 same => n,Set(DB(cool/${TR})=$[${EPOCH}+${CD}])  ; cooldown после неудачного
 same => n,Set(TRY=$[${TRY}+1])
 same => n,Goto(choose)
 ; ── Пропускаем extension (занят/кулдаун) ────────────────────────────────────
 same => n(skip),Set(TRY=$[${TRY}+1])
 same => n,Goto(choose)
 ; ── Сжигаем extension (порог достигнут) ────────────────────────────────────
 same => n(burn),NoOp(Burning ${TR}: ${CNT} >= ${THRESHOLD})
 same => n,Set(DB(gstatus/${TR})=burned)
 same => n,Set(TRY=$[${TRY}+1])
 same => n,Goto(choose)
 ; ── Все заняты ───────────────────────────────────────────────────────────────
 same => n(allbusy),NoOp(All extensions busy/burned for group ${GRP})
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()
 same => n(done),Hangup()

; ── Hangup handler: считаем звонки + кулдаун ─────────────────────────────────
[randcool-hangup]
exten => s,1,NoOp(HANGUP trunk=${RANDCOOL_TRUNK})
 same => n,GotoIf($["${RANDCOOL_TRUNK}"=""]?end)
 ; Инкрементируем счётчик
 same => n,Set(C=${DB(gcount/${RANDCOOL_TRUNK})})
 same => n,Set(C=${IF($["${C}"=""]?0:${C})})
 same => n,Set(DB(gcount/${RANDCOOL_TRUNK})=$[${C}+1])
 ; Кулдаун
 same => n,Set(CD=${DB(cool/cooldown)})
 same => n,Set(CD=${IF($["${CD}"=""]?30:${CD})})
 same => n,Set(DB(cool/${RANDCOOL_TRUNK})=$[${EPOCH}+${CD}])
 same => n(end),Return()

[from-internal-custom]
exten => _X.,1,Goto(randcool,${EXTEN},1)
